<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <title>Lista de Hospitales</title>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🏥 Sistema de Hospitales</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/hospital}">Hospitales</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/doctor}">Doctores</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/paciente}">Pacientes</a></li>
            </ul>
        </div>
    </div>
</nav>

<main>
    <div class="container px-4 py-5">
        <h1 class="pb-2 border-bottom">Lista de Hospitales</h1>
        <table class="table mt-4">
            <thead>
            <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Dirección</th>
                <th>Teléfono</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="hospital, info : ${listaHospitales}">
                <td th:text="${info.index + 1}"></td>
                <td th:text="${hospital.nombre}"></td>
                <td th:text="${hospital.direccion}"></td>
                <td th:text="${hospital.telefono}"></td>
                <td>
                    <a class="btn btn-info btn-sm" th:href="@{'/hospital/mostrarDoctores?id=' + ${hospital.id}}">
                        Mostrar doctores
                    </a>
                    <a class="btn btn-warning btn-sm" th:href="@{'/hospital/mostrarPacientes?id=' + ${hospital.id}}">
                        Mostrar pacientes
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
